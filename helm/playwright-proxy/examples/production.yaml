# Example: Production-ready configuration with autoscaling and ingress
# Usage: helm install playwright-proxy ./helm/playwright-proxy -f examples/production.yaml

replicaCount: 3

image:
  registry: ghcr.io
  repository: henkhogan/playwright-proxy
  pullPolicy: IfNotPresent
  tag: latest

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: playwright-proxy.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: playwright-proxy-tls
      hosts:
        - playwright-proxy.example.com

resources:
  limits:
    cpu: 2000m
    memory: 2048Mi
  requests:
    cpu: 1000m
    memory: 1024Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  workload: compute-intensive

tolerations:
  - key: "compute-intensive"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - playwright-proxy
          topologyKey: kubernetes.io/hostname

env:
  PROXY_PORT: "8000"

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
